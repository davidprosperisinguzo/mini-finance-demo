---
- name: Clone mini-finance repository
  git:
    repo: 'https://github.com/pravinmishraaws/mini_finance.git'
    dest: '/tmp/mini_finance'
    version: main
    update: yes
    force: yes
  register: repo_clone
  tags: deployment

- name: Ensure /var/www/html directory exists
  file:
    path: /var/www/html
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'
  tags: deployment

- name: Copy website content to web server root
  copy:
    src: '/tmp/mini_finance/'
    dest: '/var/www/html/'
    owner: www-data
    group: www-data
    mode: '0755'
    remote_src: yes
  notify: reload nginx on content changes
  tags: deployment

- name: Trigger Nginx reload after deployment
  meta: flush_handlers
  when: repo_clone.changed
  tags: deployment
